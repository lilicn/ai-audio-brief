name: Daily AI VC Morning Brief

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Check local run time
        id: timecheck
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            python -m ai_vc_podcast should-run >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.timecheck.outputs.run == 'true'
        with:
          python-version: "3.11"
      - name: Run tests
        if: steps.timecheck.outputs.run == 'true'
        run: python -m unittest discover -s tests
      - name: Generate podcast
        if: steps.timecheck.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          PODCAST_TITLE: ${{ vars.PODCAST_TITLE }}
          PODCAST_DESCRIPTION: ${{ vars.PODCAST_DESCRIPTION }}
          OUTPUT_LANGUAGE: ${{ vars.OUTPUT_LANGUAGE }}
          PODCAST_CATEGORY: ${{ vars.PODCAST_CATEGORY }}
          PODCAST_EXPLICIT: ${{ vars.PODCAST_EXPLICIT }}
          EPISODE_SLUG: ${{ vars.EPISODE_SLUG }}
          PROMPT_PATH: ${{ vars.PROMPT_PATH }}
          PODCAST_TIMEZONE: ${{ vars.PODCAST_TIMEZONE }}
          PODCAST_LOCAL_RUN_TIME: ${{ vars.PODCAST_LOCAL_RUN_TIME }}
          OPENAI_TEXT_MODEL: ${{ vars.OPENAI_TEXT_MODEL }}
          OPENAI_WEB_SEARCH_TOOL: ${{ vars.OPENAI_WEB_SEARCH_TOOL }}
          OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL }}
          OPENAI_TTS_VOICE: ${{ vars.OPENAI_TTS_VOICE }}
        run: python -m ai_vc_podcast run-all
      - name: Commit generated files
        if: steps.timecheck.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports podcast site
          git commit -m "Add daily podcast episode" || exit 0
          git push
      - name: Configure Pages
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        if: steps.timecheck.outputs.run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
